<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Rich diagonal violet-purple-indigo gradient -->
    <linearGradient id="violet-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#4c1d95" />
    </linearGradient>
    
    <!-- Text drop shadow filter -->
    <filter id="text-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <rect x="4" y="4" width="92" height="92" rx="26" fill="url(#violet-grad)" />
  
  <text
    x="50"
    y="68"
    font-family="'Instrument Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-weight="800"
    font-size="56"
    fill="#ffffff"
    text-anchor="middle"
    filter="url(#text-shadow)"
  >A</text>
</svg>